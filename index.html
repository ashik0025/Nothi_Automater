<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নথি অটোমেটর প্রো</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .toast { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">

    <!-- ================= LOGIN SCREEN ================= -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-slate-200 max-w-md w-full text-center">
            <div class="flex justify-center mb-4 text-indigo-600">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">সুরক্ষিত প্রবেশাধিকার</h2>
            <p class="text-slate-500 mb-6 text-sm">দাপ্তরিক নথি অটোমেটরে প্রবেশ করতে আপনার পাসওয়ার্ড দিন।</p>
            
            <input type="password" id="passwordInput" placeholder="পাসওয়ার্ড লিখুন..." class="w-full border border-slate-300 rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4 transition-all">
            
            <button onclick="checkPassword()" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-bold shadow-sm transition-all">
                প্রবেশ করুন
            </button>
        </div>
    </div>

    <!-- ================= MAIN APP (Hidden initially) ================= -->
    <div id="mainApp" class="hidden pb-12">
        <!-- Navbar -->
        <nav class="bg-indigo-600 text-white shadow-md">
            <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    দাপ্তরিক নথি অটোমেটর
                </h1>
                <button onclick="logout()" class="text-sm bg-indigo-800 hover:bg-indigo-900 px-4 py-2 rounded-lg font-semibold transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    লগআউট
                </button>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto mt-8 px-4">
            <!-- Tab Navigation -->
            <div class="flex space-x-2 mb-6 bg-white p-2 rounded-xl shadow-sm border border-slate-100">
                <button onclick="switchTab('use')" id="tab-use" class="flex-1 py-2 px-4 rounded-lg bg-indigo-600 text-white font-semibold transition-colors">
                    টেমপ্লেট ব্যবহার
                </button>
                <button onclick="switchTab('manage')" id="tab-manage" class="flex-1 py-2 px-4 rounded-lg bg-transparent text-slate-600 hover:bg-slate-100 font-semibold transition-colors">
                    টেমপ্লেট ম্যানেজমেন্ট
                </button>
            </div>

            <!-- Tab 1: Use Template -->
            <div id="use-tab" class="space-y-6 block">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">ক্যাটাগরি</label>
                            <select id="categorySelect" onchange="loadTemplates()" class="w-full border border-slate-300 rounded-lg p-3 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"></select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">টেমপ্লেট</label>
                            <select id="templateSelect" onchange="generateForm()" class="w-full border border-slate-300 rounded-lg p-3 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"></select>
                        </div>
                    </div>
                </div>

                <!-- Dynamic Form -->
                <div id="dynamicForm" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">তথ্য পূরণ করুন</h3>
                    <div id="inputFields" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <button onclick="generateResult()" class="mt-6 w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 font-bold shadow-sm transition-all flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        নথি তৈরি করুন
                    </button>
                </div>

                <!-- Output Area -->
                <div id="outputContainer" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-slate-800">চূড়ান্ত ফলাফল</h3>
                        <button onclick="copyText()" class="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-900 shadow-sm font-semibold transition-all flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            কপি করুন
                        </button>
                    </div>
                    <textarea id="outputText" rows="12" class="w-full border border-slate-300 rounded-lg p-4 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg leading-relaxed"></textarea>
                </div>
            </div>

            <!-- Tab 2: Manage Templates -->
            <div id="manage-tab" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <!-- List of Existing Templates -->
                <div class="lg:col-span-1 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 h-fit max-h-[80vh] overflow-y-auto">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">সংরক্ষিত টেমপ্লেট</h3>
                    <div id="savedTemplatesList" class="space-y-4"></div>
                </div>

                <!-- Editor Form -->
                <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex justify-between items-center mb-6 border-b pb-4">
                        <h3 class="text-xl font-bold text-slate-800" id="editorTitle">নতুন টেমপ্লেট যোগ করুন</h3>
                        <button onclick="clearEditor()" class="text-sm text-indigo-600 hover:text-indigo-800 font-semibold underline">ফর্ম ক্লিয়ার করুন</button>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="bg-indigo-50 text-indigo-800 p-4 rounded-lg text-sm flex gap-3">
                            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <p>যে লেখাগুলো পরিবর্তন হবে, সেগুলোকে থার্ড ব্র্যাকেট <strong>[ ]</strong> এর মধ্যে রাখুন। যেমন: <strong>[তারিখ]</strong>, <strong>[নাম]</strong>।</p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">ক্যাটাগরি</label>
                                <input type="text" id="editCategory" placeholder="যেমন: সাধারণ, ছুটি..." class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">টেমপ্লেটের নাম</label>
                                <input type="text" id="editName" placeholder="যেমন: ছুটির আবেদন..." class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">মূল টেক্সট (বডি)</label>
                            <textarea id="editBody" rows="12" placeholder="আপনার মূল টেক্সট এখানে লিখুন..." class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                        </div>

                        <button id="saveBtn" onclick="saveTemplate()" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-bold shadow-sm transition-all">
                            সংরক্ষণ করুন (Save)
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 translate-y-4 pointer-events-none z-50">
        Message
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
